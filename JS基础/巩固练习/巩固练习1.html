    // 计算银行卡余额案例
    let org = +prompt('请输入您的银行卡余额：')
    let water = +prompt('请输入您的水费：')
    let power = +prompt('请输入您的电费：')
    let internal = +prompt('请输入您的网费：')

    document.write(`
        <table>
          <caption>2026年6月消费指支出</caption>
          <tr>
            <th>银行卡余额</th>
            <th>水费</th>
            <th>电费</th>
            <th>网费</th>
            <th>银行卡余额</th>
          </tr>
          <tr>
            <td>${org}</td>
            <td>${water}</td>
            <td>${power}</td>
            <td>${internal}</td>
            <td>${org - water - power - internal}</td>
          </tr>
        </table>
    `)

    // 易错点总结
    // 字面量本质是原始数据本身
    // +'123'  +把字符串转换成数值型
    // border-collapse是表格容器属性，只能作用于<table>元素
