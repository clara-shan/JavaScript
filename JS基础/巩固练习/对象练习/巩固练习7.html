  <script>
    // 表格行要求 编号、科目、成绩、和 删除链接
    // 最后计算出总分 和 平均分
    let data = [
      { subject: '语文', score: 46 },
      { subject: '数学', score: 80 },
      { subject: '英语', score: 100 },
    ]
    let total = 0
    let tr = ''
    for (let i = 0; i < data.length; i++) {
      total += data[i].score
      tr += `
      <tr>
        <td>${i + 1}</td>
        <td>${data[i].subject}</td>
        <td>${data[i].score}</td>
        <td><a href="#">删除</a></td>
      </tr>
      `
    }
    let empty = ''
    if (data.length === 0) {
      empty = `
      <tr>
        <td colspan="4">
          <span class="none">暂无数据</span>
        </td>
      </tr>`
    }
    document.write(`
    <table>
    <thead>
      <tr>
        <th>编号</th>
        <th>科目</th>
        <th>成绩</th>
        <th>删除</th>
      </tr>
    </thead>
    <tbody>
        ${tr}
        ${empty}
    </tbody>
    <tfoot>
      <tr>
        <td colspan="4">
          <span>总分：${total}</span>
          <span>平均分：${total / data.length}</span>
        </td>
      </tr>
    </tfoot>
  </table>
`)

  </script>
