<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轮播图</title>
  <style>
    * {
      box-sizing: border-box;
    }

    .slider {
      width: 560px;
      height: 400px;
      overflow: hidden;
    }

    .slider-wrapper {
      width: 100%;
      height: 320px;
    }

    .slider-wrapper img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .slider-footer {
      height: 80px;
      background-color: rgb(100, 67, 68);
      padding: 12px 12px 0 12px;
      position: relative;
    }

    .slider-footer .toggle {
      position: absolute;
      right: 0;
      top: 12px;
      display: flex;
    }

    .slider-footer .toggle button {
      margin-right: 12px;
      width: 28px;
      height: 28px;
      appearance: none;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
    }

    .slider-footer .toggle button:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .slider-footer p {
      margin: 0;
      color: #fff;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .slider-indicator {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      align-items: center;
    }

    .slider-indicator li {
      width: 8px;
      height: 8px;
      margin: 4px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.4;
      cursor: pointer;
    }

    .slider-indicator li.active {
      width: 12px;
      height: 12px;
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="slider">
    <div class="slider-wrapper">
      <img src="./images/slider01.jpg" alt="" />
    </div>
    <div class="slider-footer">
      <p>对人类来说会不会太超前了？</p>
      <ul class="slider-indicator">
        <li class="active"></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
      <div class="toggle">
        <button class="prev">&lt;</button>
        <button class="next">&gt;</button>
      </div>
    </div>
  </div>
  <script>
    // 1. 初始数据
    const sliderData = [
      { url: './images/slider01.jpg', title: '对人类来说会不会太超前了？', color: 'rgb(100, 67, 68)' },
      { url: './images/slider02.jpg', title: '开启剑与雪的黑暗传说！', color: 'rgb(43, 35, 26)' },
      { url: './images/slider03.jpg', title: '真正的jo厨出现了！', color: 'rgb(36, 31, 33)' },
      { url: './images/slider04.jpg', title: '李玉刚：让世界通过B站看到东方大国文化', color: 'rgb(139, 98, 66)' },
      { url: './images/slider05.jpg', title: '快来分享你的寒假日常吧~', color: 'rgb(67, 90, 92)' },
      { url: './images/slider06.jpg', title: '哔哩哔哩小年YEAH', color: 'rgb(166, 131, 143)' },
      { url: './images/slider07.jpg', title: '一站式解决你的电脑配置问题！！！', color: 'rgb(53, 29, 25)' },
      { url: './images/slider08.jpg', title: '谁不想和小猫咪贴贴呢！', color: 'rgb(99, 72, 114)' },
    ]
    // // 随机生成一个数组的下标数字来进行更改
    // const random = parseInt(Math.random() * sliderData.length)
    // // 图片
    // // 获取元素
    // const img = document.querySelector('.slider-wrapper img')
    // // 更改图片
    // img.src = sliderData[random].url
    // // 文字
    // // 获取
    // const p = document.querySelector('.slider-footer p')
    // // 更改文字
    // p.innerHTML = sliderData[random].title
    // // slider-footer的背景颜色
    // // 获取
    // const color = document.querySelector('.slider-footer')
    // // 更改
    // color.style.backgroundColor = sliderData[random].color
    // // 圆点随着随机数的变化而变化
    // // 获取
    // const circle = document.querySelector(`.slider-footer li:nth-child(${random + 1})`)
    // console.log(random)
    // console.log(circle)
    // // 更改
    // circle.classList.add('active')

    // 轮播图自动播放
    const img = document.querySelector('.slider-wrapper img')
    const p = document.querySelector('.slider-footer p')
    const color = document.querySelector('.slider-footer')
    const prev = document.querySelector('.toggle .prev')
    const next = document.querySelector('.toggle .next')
    const slider = document.querySelector('.slider')
    let i = 0
    // const circle = document.querySelector('.slider-indicator li:nth-child(i)')
    // 要用模板字符串
    // 写在定时器外面，i不会发生变化，只执行一次
    // const circle = document.querySelector(`.slider-indicator li:nth-child(${i + 1})`)
    let timerId = setInterval(function () {
      // 利用JS自动调用点击事件  加小括号调用函数
      next.click()
      // i++
      // // 无缝衔接
      // // 播到最后一张图片重置i
      // if (i >= sliderData.length) {
      //   i = 0
      // }
      // // console.log(sliderData[i])
      // // 图片
      // img.src = sliderData[i].url
      // // 文字
      // p.innerHTML = sliderData[i].title
      // // 背景色
      // color.style.backgroundColor = sliderData[i].color
      // // 圆点
      // // 排他思想——先移除其他li上的active，再给当前获取的li加上active
      // // i从0开始
      // document.querySelector(`.slider-indicator .active`).classList.remove('active')
      // document.querySelector(`.slider-indicator li:nth-child(${i + 1})`).classList.add('active')
      // if (i >= sliderData.length - 1) {
      //   i = -1
      // }
    }, 1000)
    // 加上事件监听
    // 鼠标进入盒子定时器关闭
    slider.addEventListener('mouseenter', function () {
      clearInterval(timerId)
    })
    // 鼠标离开定时器开启
    slider.addEventListener('mouseleave', function () {
      clearInterval(timerId)
      timerId = setInterval(function () {
        next.click()
        // i++
        // // 无缝衔接
        // // 播到最后一张图片重置i
        // if (i >= sliderData.length) {
        //   i = 0
        // }
        // console.log(sliderData[i])
        // // 图片
        // img.src = sliderData[i].url
        // // 文字
        // p.innerHTML = sliderData[i].title
        // // 背景色
        // color.style.backgroundColor = sliderData[i].color
        // // 圆点
        // // 排他思想——先移除其他li上的active，再给当前获取的li加上active
        // // i从0开始
        // document.querySelector(`.slider-indicator .active`).classList.remove('active')
        // document.querySelector(`.slider-indicator li:nth-child(${i + 1})`).classList.add('active')
        // if (i >= sliderData.length - 1) {
        //   i = -1
        // }
        common()
      }, 1000)
    })
    prev.addEventListener('click', function () {
      i--
      if (i < 0) {
        i = sliderData.length - 1
      }
      common()
    })
    next.addEventListener('click', function () {
      i++
      if (i >= sliderData.length) {
        i = 0
      }
      common()
    })
    // 优化
    function common() {
      // 图片
      img.src = sliderData[i].url
      // 文字
      p.innerHTML = sliderData[i].title
      // 圆点
      document.querySelector('.slider-indicator .active').classList.remove('active')
      document.querySelector(`.slider-indicator li:nth-child(${i + 1})`).classList.add('active')
    }
  </script>
</body>

</html>
