    // 秒数转换为时分秒
    // 用户输入秒数
    let second = +prompt('请输入秒数:')
    // 封装函数
    function getTime(t) {
      // 转换
      h = parseInt(t / 60 / 60 % 24)
      m = parseInt(t / 60 % 60)
      s = parseInt(t % 60)
      // 补零
      h = h < 10 ? '0' + h : h
      m = m < 10 ? '0' + m : m
      s = s < 10 ? '0' + s : s
      return `转换之后${h}时${m}分${s}秒`
    }
    // 调用函数
    let str = getTime(second)
    document.write(str)
