    `)

      } else {

        let y = +prompt('请输入第二个数字')
        if (re === '+') {
          alert(`两个数的和是: ${x + y}`)
        } if (re === '-') {
          alert(`两个数的差是: ${x - y}`)
        } if (re === '*') {
